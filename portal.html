<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Meats — Place Your Order</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0f0f0f;--surface:#181818;--surface2:#222;--border:#2a2a2a;--border2:#333;
    --text:#e8e8e8;--muted:#888;--accent:#c8a84b;--accent2:#e8c96b;
    --success:#4caf7d;--danger:#e05555;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:1px;color:var(--accent);}
  .logo span{color:var(--text);font-weight:400;}
  .cust-badge{background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.3);color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;padding:4px 12px;border-radius:4px;}
  .day-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:4px;border:1px solid var(--border);}
  .main{max-width:680px;margin:0 auto;padding:20px 14px 100px;}
  .day-section{margin-bottom:18px;}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .day-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .day-btn{padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;}
  .day-btn:hover{border-color:var(--accent);color:var(--text);}
  .day-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .product-section{margin-bottom:14px;}
  /* BEEF SECTION — prominent header */
  .beef-divider{background:rgba(123,32,32,0.15);border:1px solid rgba(123,32,32,0.4);border-radius:6px 6px 0 0;padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .beef-divider-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:#eb5757;letter-spacing:0.5px;}
  .section-header{background:var(--surface2);border:1px solid var(--border);border-radius:6px 6px 0 0;padding:9px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .product-list{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;}
  .product-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background 0.1s;}
  .product-row:last-child{border-bottom:none;}
  .product-row.has-qty{background:rgba(200,168,75,0.05);}
  .plu{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:36px;flex-shrink:0;}
  .prod-name{flex:1;font-size:13px;font-weight:500;line-height:1.3;}
  .qty-input{width:58px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:500;text-align:center;padding:6px 4px;border-radius:5px;outline:none;flex-shrink:0;}
  .qty-input:focus{border-color:var(--accent);}
  .footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;z-index:100;}
  .footer-summary{font-size:13px;color:var(--muted);}
  .footer-summary strong{color:var(--accent);font-family:'DM Mono',monospace;font-size:15px;}
  .submit-btn{margin-left:auto;padding:10px 28px;background:var(--accent);border:none;border-radius:6px;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.5px;cursor:pointer;transition:background 0.15s;}
  .submit-btn:hover{background:var(--accent2);}
  .submit-btn:disabled{background:#444;color:#666;cursor:not-allowed;}
  .confirm-screen{display:none;text-align:center;padding:60px 20px;}
  .confirm-icon{font-size:64px;margin-bottom:20px;}
  .confirm-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--success);margin-bottom:8px;letter-spacing:1px;}
  .confirm-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
  .confirm-summary{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;max-width:400px;margin:0 auto 24px;}
  .confirm-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .confirm-row:last-child{border-bottom:none;}
  .confirm-row .qty{font-family:'DM Mono',monospace;color:var(--accent);font-weight:500;}
  .new-order-btn{padding:10px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
  .new-order-btn:hover{border-color:var(--accent);color:var(--accent);}
  .not-found{text-align:center;padding:80px 20px;color:var(--muted);}
  .not-found h2{font-size:22px;margin-bottom:8px;color:var(--text);}
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
  .last-order-banner{background:rgba(200,168,75,0.08);border:1px solid rgba(200,168,75,0.25);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#888;display:none;}
  .voice-btn{padding:9px 14px;background:transparent;border:1px solid #444;border-radius:6px;color:#888;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:.2s;margin-right:8px;}
  #voiceStatus{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #4b9ee8;color:#90caf9;padding:8px 18px;border-radius:20px;font-size:13px;font-family:'Barlow Condensed',sans-serif;z-index:500;white-space:nowrap;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">MH<span> MEATS</span></div>
  <div class="cust-badge" id="custBadge">Loading...</div>
  <div class="day-badge" id="dateBadge"></div>
</div>

<div class="main" id="mainArea">
  <div class="loading">Loading your order form...</div>
</div>

<div class="confirm-screen" id="confirmScreen">
  <div class="confirm-icon">✅</div>
  <div class="confirm-title">Order Submitted!</div>
  <div class="confirm-sub" id="confirmSub"></div>
  <div class="confirm-summary" id="confirmSummary"></div>
  <button class="new-order-btn" onclick="resetForm()">Place Another Order</button>
</div>

<div class="footer-bar" id="footerBar" style="display:none">
  <div class="footer-summary">
    <strong id="itemCount">0</strong> items for <span id="footerDay">—</span>
  </div>
  <button id="lastOrderBtn" class="voice-btn" onclick="loadLastOrder()" style="display:none;font-size:12px;">📋 Last Order</button>
  <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>Submit Order →</button>
</div>
<div id="voiceStatus">🎤 Listening...</div>

// KEY FIX: orderKey returns clean product name only — no PLU prefix
// This ensures Google Sheet stores clean names that match app.html
// ══════════════════════════════════════════════════════════════════
function orderKey(p) { return p.name; }

let custId = null, currentDay = 'Monday', quantities = {};

function init() {
  const d = new Date();
  document.getElementById('dateBadge').textContent =
    d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = dayNames[d.getDay()];
  if (DAYS.includes(today)) currentDay = today;

  const params = new URLSearchParams(window.location.search);
  custId = params.get('customer') || params.get('c');
  if (!custId) { showNotFound('No customer specified in link.'); return; }
  const cust = CUSTOMERS.find(c => c.id === custId);
  if (!cust) { showNotFound(`Unknown customer: "${custId}"`); return; }

  document.getElementById('custBadge').textContent = cust.name;
  document.title = `MH Meats — ${cust.name} Order`;
  renderForm();
}

function renderForm() {
  const cust = CUSTOMERS.find(c => c.id === custId);
  const main = document.getElementById('mainArea');
  let html = '';

  // Day selector
  // Day auto-set to today — no customer-facing selector

  html += `<div class="last-order-banner" id="lastOrderBanner">
    <span style="color:var(--accent);font-weight:600">📋 Last order found</span> — click <strong style="color:var(--text)">Last Order</strong> below to pre-fill this form, then edit as needed.
  </div>`;

  if (custId === 'mhchef') {
    ['BEEF','CHICKEN','LAMB'].forEach(sec => {
      const prods = cust.products.filter(p => p.section === sec);
      if (prods.length) html += buildSection(
        sec==='BEEF'?'🥩 Beef Products':sec==='CHICKEN'?'🐔 Chicken Products':'🐑 Lamb Products',
        prods, sec==='BEEF'
      );
    });
  } else {
    const standard = cust.products.filter(p => !p.flavoured);
    const flavoured = cust.products.filter(p => p.flavoured);
    const beef = BEEF_BY_CUSTOMER[custId] || [];
    // Beef FIRST — prominent, visible on mobile
    if (beef.length) html += buildSection('🥩 Beef', beef, true);
    if (standard.length) html += buildSection('🐔 Poultry', standard, false);
    if (flavoured.length) html += buildSection('🌶 Flavoured Products', flavoured, false);
  }

  html += `<div style="margin-top:20px;">
    <div class="section-label">📝 NOTES / SPECIAL REQUESTS</div>
    <textarea id="orderNotes" placeholder="Any special requests, substitutions or delivery notes..." style="width:100%;min-height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:10px;resize:vertical;margin-top:6px;"></textarea>
  </div>`;

  html += `<div id="orderHistorySection" style="margin-top:20px;">
    <div class="section-label">📋 LAST ORDER</div>
    <div id="historyContent" style="color:var(--muted);font-size:12px;">Loading...</div>
  </div>`;

  main.innerHTML = html;
  document.getElementById('footerBar').style.display = 'flex';
  updateFooter();
  fetchLastOrder();
  fetchOrderHistory();
}

function buildSection(title, products, isBeef) {
  const hdrClass = isBeef ? 'beef-divider' : 'section-header';
  const titleTag = isBeef
    ? `<div class="beef-divider-title">${title}</div><span style="font-size:10px;color:#eb5757;font-family:'DM Mono',monospace;background:rgba(123,32,32,.2);padding:2px 6px;border-radius:3px;text-transform:uppercase;">BEEF</span>`
    : title;

  const rows = products.map(p => {
    const k = orderKey(p);
    const qty = quantities[k] || 0;
    const safeId = 'row-' + k.replace(/[^a-z0-9]/gi,'_');
    return `<div class="product-row${qty>0?' has-qty':''}" id="${safeId}">
      <span class="plu">${p.plu||'—'}</span>
      <span class="prod-name">${p.name}</span>
      <input type="number" class="qty-input" min="0" value="${qty||''}" placeholder="0"
        data-key="${k}" onchange="setQty('${k}',this.value,this)" onkeydown="handleArrow(event,this)">
    </div>`;
  }).join('');

  return `<div class="product-section" style="margin-bottom:14px;">
    <div class="${hdrClass}">${titleTag}</div>
    <div class="product-list">${rows}</div>
  </div>`;
}

function selectDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateFooter();
}

function setQty(key, val, input) {
  const qty = parseInt(val) || 0;
  if (qty === 0) delete quantities[key];
  else quantities[key] = qty;
  const row = document.getElementById('row-' + key.replace(/[^a-z0-9]/gi,'_'));
  if (row) row.classList.toggle('has-qty', qty > 0);
  updateFooter();
}

function handleArrow(e, input) {
  const all = Array.from(document.querySelectorAll('.qty-input'));
  const idx = all.indexOf(input);
  if ((e.key==='ArrowDown'||e.key==='Enter') && idx < all.length-1) { e.preventDefault(); all[idx+1].focus(); all[idx+1].select(); }
  if (e.key==='ArrowUp' && idx > 0) { e.preventDefault(); all[idx-1].focus(); all[idx-1].select(); }
}

function updateFooter() {
  const count = Object.keys(quantities).length;
  document.getElementById('itemCount').textContent = count;
  document.getElementById('footerDay').textContent = currentDay;
  document.getElementById('submitBtn').disabled = count === 0;
}

function submitOrder() {
  if (!Object.keys(quantities).length) return;
  const cust = CUSTOMERS.find(c => c.id === custId);
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting...'; btn.disabled = true;

  const notes = (document.getElementById('orderNotes')?.value || '').trim();
  const payload = { customer:custId, customerName:cust.name, day:currentDay, orders:quantities, notes, timestamp:new Date().toISOString() };

  fetch(APPS_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
    .then(() => showConfirmation(payload))
    .catch(() => { btn.textContent = 'Submit Order →'; btn.disabled = false; alert('Submission failed. Please try again.'); });
}

function showConfirmation(payload) {
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('footerBar').style.display = 'none';
  document.getElementById('confirmScreen').style.display = 'block';
  const cust = CUSTOMERS.find(c => c.id === custId);
  document.getElementById('confirmSub').innerHTML = `Your order for <strong>${payload.day}</strong> has been received by MH Meats.<br>You will receive confirmation shortly.`;

  const rows = Object.entries(payload.orders).map(([k,qty]) =>
    `<div class="confirm-row"><span>${k}</span><span class="qty">× ${qty}</span></div>`
  ).join('');
  document.getElementById('confirmSummary').innerHTML = `
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase">${cust.name} — ${payload.day} — ${Object.keys(payload.orders).length} lines</div>${rows}`;
}

function resetForm() {
  quantities = {};
  document.getElementById('mainArea').style.display = 'block';
  document.getElementById('footerBar').style.display = 'flex';
  document.getElementById('confirmScreen').style.display = 'none';
  renderForm();
}

function showNotFound(msg) {
  document.getElementById('custBadge').textContent = 'Unknown';
  document.getElementById('mainArea').innerHTML = `<div class="not-found"><h2>Link not recognised</h2><p>${msg}</p><p style="margin-top:8px;font-size:13px">Please ask MH Meats to resend your order link.</p></div>`;
}

// Last Order
let lastOrderData = null;
function fetchLastOrder() {
  if (!custId) return;
  const cbName = 'lastOrderCb_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    if (document.body.contains(script)) document.body.removeChild(script);
    if (!data.orders || !data.orders.length) return;
    lastOrderData = {};
    data.orders.forEach(row => { const k=normalizeName(row.productKey||row.productName||''); if(k) lastOrderData[k]=parseInt(row.quantity)||0; });
    const banner = document.getElementById('lastOrderBanner');
    const btn = document.getElementById('lastOrderBtn');
    if (banner) banner.style.display = 'block';
    if (btn) btn.style.display = 'inline-block';
  };
  script.onerror = () => { delete window[cbName]; if (document.body.contains(script)) document.body.removeChild(script); };
  script.src = APPS_SCRIPT_URL + '?action=getLastOrder&customer=' + custId + '&callback=' + cbName;
  document.body.appendChild(script);
}

function loadLastOrder() {
  if (!lastOrderData) return;
  quantities = {...lastOrderData};
  document.querySelectorAll('.qty-input').forEach(input => {
    const key = input.getAttribute('data-key');
    if (key && quantities[key]) {
      input.value = quantities[key];
      const row = input.closest('.product-row');
      if (row) row.classList.add('has-qty');
    }
  });
  updateFooter();
  const btn = document.getElementById('lastOrderBtn');
  if (btn) { btn.textContent = '✓ Loaded'; btn.style.color='var(--success)'; btn.style.borderColor='var(--success)'; btn.disabled=true; }
}

// Order History
function fetchOrderHistory() {
  if (!custId) { document.getElementById('historyContent').innerHTML = '<div style="color:#555;font-size:11px;">No history available.</div>'; return; }
  const cbName = 'historyCb_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    if (document.body.contains(script)) document.body.removeChild(script);
    if (!data.orders || !data.orders.length) { document.getElementById('historyContent').innerHTML = '<div style="color:#555;font-size:11px;">No order history found.</div>'; return; }
    renderHistory(data.orders);
  };
  script.onerror = () => { delete window[cbName]; if (document.body.contains(script)) document.body.removeChild(script); document.getElementById('historyContent').innerHTML = '<div style="color:#555;font-size:11px;">Could not load history.</div>'; };
  script.src = APPS_SCRIPT_URL + '?action=getHistory&customer=' + custId + '&days=1&callback=' + cbName;
  document.body.appendChild(script);
}

function renderHistory(orders) {
  const el = document.getElementById('historyContent'); if (!el) return;
  const groups = {};
  orders.forEach(row => {
    const key = row.day + '|' + row.timestamp;
    if (!groups[key]) groups[key] = {day:row.day, timestamp:row.timestamp, items:[]};
    groups[key].items.push(row);
  });
  const sorted = Object.values(groups).sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
  if (!sorted.length) { el.innerHTML = '<div style="color:#555;font-size:11px;">No history found.</div>'; return; }
  const g = sorted[0];
  const d = new Date(g.timestamp);
  const dateStr = d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
  const timeStr = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const itemRows = g.items.map(item => {
    const parts = (item.productKey||'').split('|');
    const plu = parts.length > 1 ? parts[0] : '—';
    const name = item.productName || (parts.length > 1 ? parts.slice(1).join('|').trim() : item.productKey);
    return `<div style="display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid var(--border);font-size:12px;gap:8px;">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:32px;flex-shrink:0;">${plu}</span>
      <span style="flex:1;">${name}</span>
      <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);">× ${item.quantity}</span>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden;">
    <div style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;">${g.day}</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:8px;">${dateStr} ${timeStr}</span>
      </div>
      <span style="font-size:10px;color:var(--muted);">${g.items.length} items</span>
    </div>
    ${itemRows}
  </div>`;
}

function toggleHist(i) {
  const el = document.getElementById('hitems-'+i);
  const tog = document.getElementById('htog-'+i);
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  tog.textContent = open ? '▲' : '▼';
}

function reorderHist(dataStr) {
  try {
    const rawData=JSON.parse(dataStr.replace(/&quot;/g,'"'));
    const data={}; Object.entries(rawData).forEach(([k,v])=>{const nk=normalizeName(k);if(nk)data[nk]=v;}); quantities={...data};
    document.querySelectorAll('.qty-input').forEach(input => {
      const key = input.getAttribute('data-key');
      if (key && quantities[key]) { input.value = quantities[key]; const row = input.closest('.product-row'); if (row) row.classList.add('has-qty'); }
    });
    updateFooter();
    document.getElementById('mainArea').scrollTo({top:0,behavior:'smooth'});
  } catch(e) {}
}

// Voice
let recognition = null, voiceActive = false;
function toggleVoice() { voiceActive ? stopVoice() : startVoice(); }
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input only works in Chrome.'); return; }
  recognition = new SR();
  recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'en-GB';
  recognition.onresult = e => {
    const text = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    processVoice(text);
  };
  recognition.onerror = e => { if (e.error !== 'aborted') showVoiceStatus('Error: ' + e.error, 3000); };
  recognition.onend = () => { if (voiceActive) recognition.start(); };
  recognition.start(); voiceActive = true;
  const btn = document.getElementById('voiceBtn');
  btn.style.background='#c0392b'; btn.style.color='#fff'; btn.style.borderColor='#c0392b'; btn.textContent='🎤 Stop';
  showVoiceStatus('🎤 Listening...', 0);
}
function stopVoice() {
  voiceActive = false; if (recognition) recognition.stop();
  const btn = document.getElementById('voiceBtn');
  btn.style.background='transparent'; btn.style.color='#888'; btn.style.borderColor='#444'; btn.textContent='🎤';
  document.getElementById('voiceStatus').style.display = 'none';
}
function showVoiceStatus(msg, dur) {
  const el = document.getElementById('voiceStatus'); el.textContent = msg; el.style.display = 'block';
  if (dur > 0) setTimeout(() => { if (!voiceActive) el.style.display='none'; else el.textContent='🎤 Listening...'; }, dur);
}
function processVoice(text) {
  const cust = CUSTOMERS.find(c => c.id === custId); if (!cust) return;
  const allProds = [...cust.products, ...(BEEF_BY_CUSTOMER[custId]||[])];
  const numWords = {one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50};
  let t = text;
  Object.keys(numWords).forEach(w => { t = t.replace(new RegExp('\\b'+w+'\\b','g'), numWords[w]); });
  const numMatch = t.match(/\b(\d+)\b/); if (!numMatch) return;
  const qty = parseInt(numMatch[1]);
  const productText = t.replace(numMatch[0],'').trim();
  if (!qty || qty <= 0 || !productText) return;
  let bestMatch = null, bestScore = 0;
  allProds.forEach(p => {
    const score = voiceScore(productText, p.name.toLowerCase());
    if (score > bestScore) { bestScore = score; bestMatch = p; }
  });
  if (bestMatch && bestScore > 0.35) {
    const k = orderKey(bestMatch);
    const input = document.querySelector('[data-key="' + k + '"]');
    if (input) { input.value = qty; setQty(k, qty, input); input.closest('.product-row').scrollIntoView({behavior:'smooth',block:'center'}); }
    showVoiceStatus('✓ ' + bestMatch.name + ' = ' + qty, 2500);
  } else {
    showVoiceStatus('? Not recognised: "' + productText + '"', 3000);
  }
}
function voiceScore(spoken, productName) {
  const sw = spoken.split(/\s+/).filter(w=>w.length>2);
  const pw = productName.split(/\s+/).filter(w=>w.length>2);
  if (!sw.length) return 0;
  let matches = 0;
  sw.forEach(s => { if (pw.some(p=>p.includes(s)||s.includes(p))) matches++; });
  return matches / Math.max(sw.length, pw.length);
}


// ═══════════════════════════════════════
// NAME NORMALISATION — matches main app
// ═══════════════════════════════════════
const NAME_MAP={
  // Old portal pack names → canonical staff app names
  'CARCASS-1-PACK':                    'CARCASS-1-PACK',
  'CARCASS-2-PACK':                    'CARCASS-2-PACK',
  'CARCASS-5-PACK':                    'CARCASS-5-PACK',
  '5-PACK CARCASSES':                  'CARCASS-5-PACK',
  'ROASTER IN 1/4 SHNIZELED':          'ROASTER IN 1/4 SHNITZELED',
  'ROASTER IN 1/8 SHNIZELED':          'ROASTER IN 1/8 SHNITZELED',
  'BREAST ROASTER':                    'BREAST QUARTERS',
  'BREAST QUARTER ROASTER':            'BREAST QUARTERS',
  'CHICKEN FILLET':                    'CHICKEN FILLETS',
  'KOSHERED CHICKEN LIVER':            'CHICKEN LIVER',
  'HIGH QUALITY MINCED CHICKEN':       'MINCED CHICKEN',
  'CHICKEN SHNITZEL VALUE PACK (10)':  '10-PACK CHICKEN SHNITZELS',
  'CHICKEN SHNITZEL 6-PACK':           '6-PACK CHICKEN SHNITZELS',
  'CHICKEN WINGS (12 PIECES)':         '12-PACK CHICKEN WINGS',
  'DARK SHNITZEL (PARGIOT)':           'PARGIOT',
  'ROASTER THIGHS':                    'CHICKEN THIGHS',
  'ROASTER LEG QUARTERS 2-PACK':       'CHICKEN LEGS-2 PACK',
  'ROASTER LEG QUARTERS VALUE PACK (4)':'CHICKEN LEGS-VALUE PACK',
  'ROASTER LEG QUARTERS IN 1/8':       'CHICKEN LEGS IN 1/8-2 PACK',
  'ROASTER LEG QUARTERS IN 1/8 VALUE PACK':'CHICKEN LEGS IN 1/8-VALUE PACK',
  'FAMILY SIZE SOUP PACK':             'DOUBLE SOUP PACK',
  'NECKS 8-PACK':                      'NECKS 8-PACK',
  'CHICKEN NECK (8-PACK)':             'CHICKEN NECK (8-PACK)',
  'CHICKEN NECKS (8-PACK)':            'CHICKEN NECK (8-PACK)',
  'MEAT BALLS - 24 PACK':              'MEAT BALLS-24 PACK',
  'MEAT BALLS-24 PACK':                'MEAT BALLS-24 PACK',
  'CLASSIC 2 OUNCE BEEFBURGERS - PACK OF 6':'CLASSIC 2 OUNCE BEEFBURGERS-PACK OF 6',
  'BOLA JOINT LARGE':                  'BOLA JOINT',
  'FLAT BRISKET JOINT LARGE':          'FLAT BRISKET JOINT',
  'FLAT PICKLED JOINT LARGE':          'FLAT PICKLED JOINT',
  'PICKLED BEEF ROLL LARGE':           'PICKLED BEEF ROLL',
  'POT ROAST LARGE':                   'POT ROAST',
  'ROLLED BRISKET JOINT LARGE':        'ROLLED BRISKET JOINT',
  'ROLLED PICKLED BRISKET LARGE':      'ROLLED PICKLED BRISKET',
};
function normalizeName(raw){
  if(!raw) return '';
  let s=String(raw).trim().replace(/^\d+\|/,'').replace(/_/g,' ').trim();
  if(NAME_MAP[s]) return NAME_MAP[s];
  const u=s.toUpperCase();
  if(NAME_MAP[u]) return NAME_MAP[u];
  const clean=u.replace(/\s*-\s*/g,'-').replace(/\s+/g,' ');
  if(NAME_MAP[clean]) return NAME_MAP[clean];
  return s;
}

init();
