<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Meats — Place Your Order</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f; --surface: #181818; --surface2: #222;
    --border: #2a2a2a; --border2: #333; --text: #e8e8e8;
    --muted: #888; --accent: #c8a84b; --accent2: #e8c96b;
    --success: #4caf7d; --danger: #e05555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 1px; color: var(--accent); }
  .logo span { color: var(--text); font-weight: 400; }
  .cust-badge {
    background: rgba(200,168,75,0.12); border: 1px solid rgba(200,168,75,0.3);
    color: var(--accent); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    padding: 4px 12px; border-radius: 4px;
  }
  .day-badge {
    margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); background: var(--surface2);
    padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
  }

  .main { max-width: 680px; margin: 0 auto; padding: 24px 16px 100px; }

  /* Day selector */
  .day-section { margin-bottom: 20px; }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .day-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-btn {
    padding: 8px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* Product sections */
  .product-section { margin-bottom: 16px; }
  .section-header {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px 6px 0 0; padding: 8px 14px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 0.5px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .product-list { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; }
  .product-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .product-row:last-child { border-bottom: none; }
  .product-row.has-qty { background: rgba(200,168,75,0.05); }
  .plu { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 38px; flex-shrink: 0; }
  .prod-name { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.3; }
  .qty-input {
    width: 60px; background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px;
    font-weight: 500; text-align: center; padding: 6px 4px; border-radius: 5px;
    outline: none; flex-shrink: 0;
  }
  .qty-input:focus { border-color: var(--accent); }

  /* Sticky footer bar */
  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    z-index: 100;
  }
  .footer-summary { font-size: 13px; color: var(--muted); }
  .footer-summary strong { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 15px; }
  .submit-btn {
    margin-left: auto; padding: 10px 28px;
    background: var(--accent); border: none; border-radius: 6px;
    color: #000; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 15px; letter-spacing: 0.5px;
    cursor: pointer; transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--accent2); }
  .submit-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

  /* Confirmation screen */
  .confirm-screen {
    display: none; text-align: center; padding: 60px 20px;
  }
  .confirm-icon { font-size: 64px; margin-bottom: 20px; }
  .confirm-title {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 28px; color: var(--success); margin-bottom: 8px; letter-spacing: 1px;
  }
  .confirm-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .confirm-summary {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; text-align: left;
    max-width: 400px; margin: 0 auto 24px;
  }
  .confirm-row {
    display: flex; justify-content: space-between; padding: 4px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-row .qty { font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; }
  .new-order-btn {
    padding: 10px 24px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .new-order-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Not found */
  .not-found { text-align: center; padding: 80px 20px; color: var(--muted); }
  .not-found h2 { font-size: 22px; margin-bottom: 8px; color: var(--text); }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

  /* Config notice */
  .config-banner {
    background: rgba(200,168,75,0.1); border: 1px solid rgba(200,168,75,0.3);
    border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MH<span> MEATS</span></div>
  <div class="cust-badge" id="custBadge">Loading...</div>
  <div class="day-badge" id="dateBadge"></div>
</div>

<div class="main" id="mainArea">
  <div class="loading">Loading your order form...</div>
</div>

<!-- Confirmation screen (outside main so it replaces it) -->
<div class="confirm-screen" id="confirmScreen">
  <div class="confirm-icon">✅</div>
  <div class="confirm-title">Order Submitted!</div>
  <div class="confirm-sub" id="confirmSub"></div>
  <div class="confirm-summary" id="confirmSummary"></div>
  <button class="new-order-btn" onclick="resetForm()">Place Another Order</button>
</div>

<div class="footer-bar" id="footerBar" style="display:none">
  <div class="footer-summary">
    <strong id="itemCount">0</strong> items selected for <span id="footerDay">—</span>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Submit Order →</button>
</div>

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzTP99JfUBEHGTF0av8WCeDEvN_qAnoq1Bcq3jECZMtaQNeJJc85e-toJuBohSpKWdl/exec';

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
let custId = null;
let currentDay = 'Monday';
let quantities = {}; // productKey -> qty

function orderKey(p) { return (p.plu||'') + '|' + p.name; }

// ══════════════════════════════════════════════════════════════════
// INIT — read ?customer= from URL
// ══════════════════════════════════════════════════════════════════
function init() {
  // Set date badge
  const d = new Date();
  document.getElementById('dateBadge').textContent =
    d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});

  // Auto-select today's day if it's a weekday
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = dayNames[d.getDay()];
  if (DAYS.includes(today)) currentDay = today;

  // Read customer from URL param
  const params = new URLSearchParams(window.location.search);
  custId = params.get('customer') || params.get('c');

  if (!custId) { showNotFound('No customer specified in link.'); return; }

  const cust = CUSTOMERS.find(c => c.id === custId);
  if (!cust) { showNotFound(`Unknown customer: "${custId}"`); return; }

  document.getElementById('custBadge').textContent = cust.name;
  document.title = `MH Meats — ${cust.name} Order`;

  renderForm();
}

// ══════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════
function renderForm() {
  const cust = CUSTOMERS.find(c => c.id === custId);
  const main = document.getElementById('mainArea');

  let html = '';

  // Config notice if not set up
  // URL configured — no warning needed

  // Day selector
  html += `<div class="day-section">
    <div class="section-label">📅 Select Day</div>
    <div class="day-btns">
      ${DAYS.map(d => `<div class="day-btn ${d===currentDay?'active':''}" onclick="selectDay('${d}',this)">${d.slice(0,3).toUpperCase()}</div>`).join('')}
    </div>
  </div>`;

  // Products
  if (custId === 'mhchef') {
    ['BEEF','CHICKEN','LAMB'].forEach(sec => {
      const prods = cust.products.filter(p => p.section === sec);
      if (prods.length) html += buildSection(sec === 'BEEF' ? '🥩 Beef Products' : sec === 'CHICKEN' ? '🐔 Chicken Products' : '🐑 Lamb Products', prods);
    });
  } else {
    const standard = cust.products.filter(p => !p.flavoured);
    const flavoured = cust.products.filter(p => p.flavoured);
    const beef = BEEF_BY_CUSTOMER[custId] || [];
    if (standard.length) html += buildSection('🐔 Poultry', standard);
    if (flavoured.length) html += buildSection('🌶 Flavoured Products', flavoured);
    if (beef.length) html += buildSection('🥩 Beef', beef);
  }

  main.innerHTML = html;
  document.getElementById('footerBar').style.display = 'flex';
  updateFooter();
}

function buildSection(title, products) {
  const rows = products.map(p => {
    const k = orderKey(p);
    const qty = quantities[k] || 0;
    return `<div class="product-row ${qty > 0 ? 'has-qty' : ''}" id="row-${k.replace(/[^a-z0-9]/gi,'_')}">
      <span class="plu">${p.plu || '—'}</span>
      <span class="prod-name">${p.name}</span>
      <input type="number" class="qty-input" min="0" value="${qty || ''}" placeholder="0"
        data-key="${k}"
        onchange="setQty('${k}', this.value, this)"
        onkeydown="handleArrow(event,this)">
    </div>`;
  }).join('');

  return `<div class="product-section">
    <div class="section-header">${title}</div>
    <div class="product-list">${rows}</div>
  </div>`;
}

function selectDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateFooter();
}

function setQty(key, val, input) {
  const qty = parseInt(val) || 0;
  if (qty === 0) delete quantities[key];
  else quantities[key] = qty;

  const safeKey = key.replace(/[^a-z0-9]/gi, '_');
  const row = document.getElementById('row-' + safeKey);
  if (row) row.classList.toggle('has-qty', qty > 0);
  updateFooter();
}

function handleArrow(e, input) {
  const all = Array.from(document.querySelectorAll('.qty-input'));
  const idx = all.indexOf(input);
  if ((e.key === 'ArrowDown' || e.key === 'Enter') && idx < all.length - 1) {
    e.preventDefault(); all[idx+1].focus(); all[idx+1].select();
  }
  if (e.key === 'ArrowUp' && idx > 0) {
    e.preventDefault(); all[idx-1].focus(); all[idx-1].select();
  }
}

function updateFooter() {
  const count = Object.keys(quantities).length;
  document.getElementById('itemCount').textContent = count;
  document.getElementById('footerDay').textContent = currentDay;
  document.getElementById('submitBtn').disabled = count === 0;
}

// ══════════════════════════════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════════════════════════════
function submitOrder() {
  if (!Object.keys(quantities).length) return;

  const cust = CUSTOMERS.find(c => c.id === custId);
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.textContent = 'Submitting...';
  submitBtn.disabled = true;

  const payload = {
    customer: custId,
    customerName: cust.name,
    day: currentDay,
    orders: quantities,
    timestamp: new Date().toISOString()
  };

  // URL is live — proceed to submit

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => showConfirmation(payload, false))
  .catch(err => {
    submitBtn.textContent = 'Submit Order →';
    submitBtn.disabled = false;
    alert('Submission failed. Please try again or contact MH Meats directly.');
  });
}

function showConfirmation(payload, demoMode) {
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('footerBar').style.display = 'none';
  document.getElementById('confirmScreen').style.display = 'block';

  const cust = CUSTOMERS.find(c => c.id === custId);
  const count = Object.keys(payload.orders).length;

  document.getElementById('confirmSub').innerHTML =
    `Your order for <strong>${payload.day}</strong> has been received by MH Meats.<br>
     ${demoMode ? '<em style="color:var(--muted);font-size:12px">(Demo mode — configure Google Apps Script URL to enable live submission)</em><br>' : ''}
     You will receive confirmation shortly.`;

  // Build summary of what was ordered
  const allProducts = [];
  const custData = CUSTOMERS.find(c => c.id === custId);
  if (custData) {
    custData.products.forEach(p => { if (!allProducts.find(x => x.key === orderKey(p))) allProducts.push({key: orderKey(p), name: p.name, plu: p.plu}); });
  }
  (BEEF_BY_CUSTOMER[custId] || []).forEach(p => { if (!allProducts.find(x => x.key === orderKey(p))) allProducts.push({key: orderKey(p), name: p.name, plu: p.plu}); });

  const rows = Object.entries(payload.orders).map(([k, qty]) => {
    const prod = allProducts.find(p => p.key === k);
    return `<div class="confirm-row">
      <span>${prod ? prod.name : k.split('|')[1]}</span>
      <span class="qty">× ${qty}</span>
    </div>`;
  }).join('');

  document.getElementById('confirmSummary').innerHTML = `
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase">
      ${cust.name} — ${payload.day} — ${count} lines
    </div>
    ${rows}`;
}

function resetForm() {
  quantities = {};
  document.getElementById('mainArea').style.display = 'block';
  document.getElementById('footerBar').style.display = 'flex';
  document.getElementById('confirmScreen').style.display = 'none';
  renderForm();
}

function showNotFound(msg) {
  document.getElementById('custBadge').textContent = 'Unknown';
  document.getElementById('mainArea').innerHTML = `
    <div class="not-found">
      <h2>Link not recognised</h2>
      <p>${msg}</p>
      <p style="margin-top:8px;font-size:13px">Please ask MH Meats to resend your order link.</p>
    </div>`;
}

init();
</script>
</body>
</html>
